site_name: "RGDS: Regulated Gate Decision Support"
site_description: >
  A decision-centric AI governance framework for regulated biopharma/biotech programs.
  Ten-question independent study on reconstructability, AI accountability, FDA compliance,
  and implementation of schema-validated decision logs in phase-gated drug development.
site_url: https://mj3b.github.io/rgds-independent-study
repo_url: https://github.com/mj3b/rgds-independent-study
repo_name: mj3b/rgds-independent-study

copyright: Copyright &copy; 2026 Mark Julius Banasihan · Apache License 2.0

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tooltips
    - toc.follow
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Research Questions:
      - Overview: questions/index.md
      - "Q1: Decision Reconstructability": questions/q1.md
      - "Q2: AI Accountability": questions/q2.md
      - "Q3: Integration Without Overhead": questions/q3.md
      - "Q4: FDA Deficiency Prevention": questions/q4.md
      - "Q5: Decision Velocity": questions/q5.md
      - "Q6: Strategic Alignment": questions/q6.md
      - "Q7: ROI Measurement": questions/q7.md
      - "Q8: Implementation Roadmap": questions/q8.md
      - "Q9: AI Governance Disclosure": questions/q9.md
      - "Q10: Regulatory Mandate Trajectory": questions/q10.md
      - Results Overview: questions/results-overview.md
  - References:
      - About the Author: references/about-the-author.md
      - Acknowledgements: references/acknowledgements.md
      - Bibliography: references/bibliography.md
      - Appendix A — Financial Analysis: references/appendix-a.md
      - Methods and Technical Notes: references/methods-and-tools.md

plugins:
  - search:
      lang: en
  - glightbox

markdown_extensions:
  - admonition
  - footnotes
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - toc:
      permalink: true
      title: On this page

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/mj3b
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/markjuliusbanasihan
      name: LinkedIn
  analytics:
    feedback:
      title: Was this page useful?
      ratings:
        - icon: material/thumb-up-outline
          name: This page was helpful
          data: 1
          note: Thanks for your feedback!
        - icon: material/thumb-down-outline
          name: This page could be improved
          data: 0
          note: Thanks for your feedback.
